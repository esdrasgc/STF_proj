services:
  rabbitmq:
    image: rabbitmq:3-management
    container_name: rabbitmq
    ports:
      - "5672:5672"
      - "15672:15672"
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_DEFAULT_USER}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_DEFAULT_PASS}
    networks:
      - rede_stf_proj

  mongo:
    image: mongo:latest
    container_name: mongo
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_INITDB_ROOT_USERNAME}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_INITDB_ROOT_PASSWORD}
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    networks:
      - rede_stf_proj

  mongo-express:
    image: mongo-express:latest
    container_name: mongo-express
    environment:
      ME_CONFIG_MONGODB_ADMINUSERNAME: ${ME_CONFIG_MONGODB_ADMINUSERNAME}
      ME_CONFIG_MONGODB_ADMINPASSWORD: ${ME_CONFIG_MONGODB_ADMINPASSWORD}
      ME_CONFIG_BASICAUTH_USERNAME: ${ME_CONFIG_BASICAUTH_USERNAME}
      ME_CONFIG_BASICAUTH_PASSWORD: ${ME_CONFIG_BASICAUTH_PASSWORD}
      ME_CONFIG_MONGODB_SERVER: mongo
    ports:
      - "8081:8081"
    depends_on:
      - mongo
    networks:
      - rede_stf_proj

  redis:
    image: redis:7-alpine
    container_name: redis
    ports:
      - "6379:6379"
    networks:
      - rede_stf_proj
    restart: always

  celery_worker:
    build:
      context: .
      dockerfile: celery_worker.Dockerfile
    environment:
      CELERY_BROKER_URL: ${CELERY_BROKER_URL}
      CELERY_RESULT_BACKEND: ${CELERY_RESULT_BACKEND}
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_INITDB_ROOT_USERNAME}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_INITDB_ROOT_PASSWORD}
      MONGO_HOST: mongo
      MONGO_PORT: 27017
      MONGO_DB: ${MONGO_DB}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_DB: 0
      # Rate limiting e concorrência (configuráveis via .env)
      MAX_REQUESTS_PER_MINUTE: ${MAX_REQUESTS_PER_MINUTE}
      MIN_DELAY_PROCESSO: ${MIN_DELAY_PROCESSO}
      MAX_DELAY_PROCESSO: ${MAX_DELAY_PROCESSO}
      MIN_DELAY_ABA: ${MIN_DELAY_ABA}
      MAX_DELAY_ABA: ${MAX_DELAY_ABA}
      RETRY_COUNTDOWN_SECONDS: ${RETRY_COUNTDOWN_SECONDS}
      MAX_RETRIES: ${MAX_RETRIES}
      REQUEST_TIMEOUT: ${REQUEST_TIMEOUT}
      WORKER_CONCURRENCY: ${WORKER_CONCURRENCY}
      WORKER_PREFETCH_MULTIPLIER: ${WORKER_PREFETCH_MULTIPLIER}
    depends_on:
      - rabbitmq
      - mongo
      - redis
    networks:
      - rede_stf_proj
    ports:
      - "80:8000"
    restart: always


networks:
  rede_stf_proj:
    driver: bridge

volumes:
  mongo_data: