services:
  rabbitmq:
    image: rabbitmq:3-management
    container_name: rabbitmq
    ports:
      - "5672:5672"
      - "15672:15672"
    environment:
      RABBITMQ_DEFAULT_USER: guest
      RABBITMQ_DEFAULT_PASS: guest
    networks:
      - rede_stf_proj

  mongo:
    image: mongo:latest
    container_name: mongo
    environment:
      MONGO_INITDB_ROOT_USERNAME: root
      MONGO_INITDB_ROOT_PASSWORD: example
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    networks:
      - rede_stf_proj

  mongo-express:
    image: mongo-express:latest
    container_name: mongo-express
    environment:
      ME_CONFIG_MONGODB_ADMINUSERNAME: root
      ME_CONFIG_MONGODB_ADMINPASSWORD: example
      ME_CONFIG_BASICAUTH_USERNAME: root
      ME_CONFIG_BASICAUTH_PASSWORD: example
      ME_CONFIG_MONGODB_SERVER: mongo
    ports:
      - "8081:8081"
    depends_on:
      - mongo
    networks:
      - rede_stf_proj

  celery_worker:
    build:
      context: .
      dockerfile: celery_worker.Dockerfile
    environment:
      CELERY_BROKER_URL: amqp://guest:guest@rabbitmq:5672//
      CELERY_RESULT_BACKEND: mongodb://root:example@mongo:27017/celery_results?authSource=admin
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_INITDB_ROOT_USERNAME}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_INITDB_ROOT_PASSWORD}
      MONGO_HOST: mongo
      MONGO_PORT: 27017
      MONGO_DB: ${MONGO_DB}
    depends_on:
      - rabbitmq
      - mongo
    networks:
      - rede_stf_proj
    restart: always

  coleta_ids:
    build:
      context: .
      dockerfile: coletor_ids.Dockerfile
    environment:
      CELERY_BROKER_URL: amqp://guest:guest@rabbitmq:5672//
      CELERY_RESULT_BACKEND: mongodb://root:example@mongo:27017/celery_results?authSource=admin
    ports:
      - "80:8000"
    depends_on:
      - rabbitmq
    networks:
      - rede_stf_proj

  # coleta_processo removed; handled by celery_worker

  # coleta_aba removed; handled by celery_worker

networks:
  rede_stf_proj:
    driver: bridge

volumes:
  mongo_data: